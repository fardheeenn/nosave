name: Build NoSave APK
on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install dependencies
        run: |
          npm install
          npx expo install --fix

      - name: Prebuild Android
        run: npx expo prebuild --platform android --no-install

      - name: Build APK
        run: |
          # 1. Ensure the assets folder exists
          mkdir -p android/app/src/main/assets
          
          # 2. Bundle the code using the Expo CLI (this is more reliable for Expo 51)
          npx expo export:embed --platform android --dev false --entry-file index.js --bundle-output android/app/src/main/assets/index.android.bundle --assets-dest android/app/src/main/res
          
          cd android
          # 3. Clean up the splash screen leftovers
          rm -rf app/src/main/res/drawable/splashscreen.xml
          find app/src/main/res/values -name "styles.xml" -exec sed -i 's/@drawable\/splashscreen/@android:color\/transparent/g' {} +
          
          chmod +x gradlew
          ./gradlew assembleDebug -x lint --no-daemon
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: NoSave-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
