name: Build NoSave Optimized
on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install dependencies
        run: npm install

      - name: Build APK (Optimized Release)
        run: |
          # 1. Install Expo CLI locally
          npx expo prebuild --platform android
          
          # 2. Navigate to the generated folder
          cd android
          
          # 3. Build the Release version (This handles shrinking & lag)
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon
