name: Build NoSave Optimized
on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install dependencies
        run: npm install

      - name: Build APK (Optimized Release)
        run: |
          # 1. Generate the android folder
          npx expo prebuild --platform android
          
          # 2. FIX: Remove the problematic splashscreen file that is causing the error
          rm -f android/app/src/main/res/drawable/splashscreen.xml
          
          # 3. FIX: Clean up the styles to remove any background color references that don't exist
          find android/app/src/main/res/values -name "styles.xml" -exec sed -i 's/@drawable\/splashscreen/@android:color\/transparent/g' {} +
          find android/app/src/main/res/values -name "colors.xml" -exec sed -i '/splashscreen_background/d' {} +

          # 4. Build the final small, fast APK
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon
