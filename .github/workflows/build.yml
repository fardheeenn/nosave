name: Build NoSave Optimized
on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install dependencies
        run: npm install

      - name: Build Optimized APK
        run: |
          # 1. Prepare the assets folder for the bundle
          mkdir -p android/app/src/main/assets
          
          # 2. Bundle the code with 'dev false' (This removes lag and shrinks size)
          npx expo export:embed --platform android --dev false --entry-file index.js --bundle-output android/app/src/main/assets/index.android.bundle --assets-dest android/app/src/main/res
          
          cd android
          # 3. Clean up any leftover splash references
          rm -f app/src/main/res/drawable/splashscreen.xml
          find app/src/main/res/values -name "styles.xml" -exec sed -i 's/@drawable\/splashscreen/@android:color\/transparent/g' {} +
          
          # 4. Compile the RELEASE version (Small and Fast)
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon
